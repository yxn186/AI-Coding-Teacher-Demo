<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>积木小老师</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sr-only">
    <div id="live-polite" aria-live="polite" aria-atomic="true"></div>
    <div id="live-assertive" aria-live="assertive" aria-atomic="true"></div>
  </div>

  <div class="page-shell">
    <header class="top-bar card">
      <div class="brand">
        <div class="brand-mark" aria-label="品牌图标">
          <img id="brand-photo" class="brand-photo" alt="左上角照片图标" hidden>
          <span id="brand-fallback" class="brand-fallback" aria-hidden="true">🧩</span>
        </div>
        <div>
          <h1>积木小老师</h1>
          <p>AI 编程启蒙伙伴</p>
        </div>
      </div>
      <div class="top-actions">
        <button id="read-task-btn" class="icon-button primary" type="button" aria-label="朗读当前任务">
          <span class="button-icon control-icon" aria-hidden="true">📖</span>
          <span class="button-label">朗读</span>
        </button>
        <button id="skip-speech-btn" class="icon-button ghost" type="button" aria-label="跳过当前朗读">
          <span class="button-icon control-icon" aria-hidden="true">⏭️</span>
          <span class="button-label">跳过</span>
        </button>
        <button id="stop-btn" class="icon-button ghost warn" type="button" aria-label="停止当前运行">
          <span class="button-icon control-icon" aria-hidden="true">⏹️</span>
          <span class="button-label">停下</span>
        </button>
        <button
          id="sound-toggle-btn"
          class="icon-button ghost"
          type="button"
          aria-label="切换声音"
          aria-pressed="false"
        >
          <span id="sound-toggle-icon" class="button-icon control-icon" aria-hidden="true">🔊</span>
          <span id="sound-toggle-text" class="button-label">有声</span>
        </button>
      </div>
    </header>

    <section id="status-strip" class="status-strip card" role="status" aria-live="polite" aria-atomic="true">
      <div class="status-main">
        <span id="status-kind" class="status-kind status-idle">本地原型</span>
        <p id="status-text" class="status-text">本地原型已准备好。</p>
      </div>
      <div class="status-meta">
        <span id="provider-status" class="status-chip">适配器：mock</span>
        <span id="runtime-status" class="status-chip">未运行</span>
        <span id="save-status" class="status-chip">未保存</span>
        <button
          id="debug-toggle-btn"
          class="pill-button ghost"
          type="button"
          aria-expanded="false"
          aria-controls="debug-panel"
        >
          <span id="debug-toggle-icon" class="button-icon control-icon" aria-hidden="true">🛠️</span>
          <span id="debug-toggle-text" class="button-label">调试</span>
        </button>
      </div>
    </section>

    <main class="main-grid">
      <section class="task-panel card">
        <div class="panel-head">
          <h2>任务</h2>
          <span class="panel-badge">选一个玩</span>
        </div>
        <div id="task-list" class="task-list" aria-label="任务列表"></div>

        <div class="voice-panel">
          <div class="panel-head small">
            <h3>说一说</h3>
            <button
              id="voice-toggle-btn"
              class="round-icon"
              type="button"
              aria-label="打开语音示例"
              aria-expanded="false"
              aria-controls="voice-samples"
            >
              <span class="button-icon control-icon" aria-hidden="true">🎤</span>
            </button>
          </div>
          <div id="voice-user-bubble" class="voice-user-bubble" aria-live="polite"></div>
          <div id="voice-samples" class="voice-samples" aria-label="预置语音指令"></div>
        </div>
      </section>

      <section class="stage-panel card">
        <div class="panel-head">
          <h2>舞台</h2>
          <div class="stage-badges">
            <span id="task-badge" class="panel-badge">任务</span>
            <span id="scene-badge" class="panel-badge soft">草地</span>
          </div>
        </div>

        <div id="stage-world" class="stage-world scene-meadow">
          <div class="stage-deco deco-star star-a" aria-hidden="true">⭐</div>
          <div class="stage-deco deco-star star-b" aria-hidden="true">⭐</div>
          <div class="stage-deco deco-star star-c" aria-hidden="true">⭐</div>
          <div class="stage-deco deco-cloud cloud-a" aria-hidden="true"></div>
          <div class="stage-deco deco-cloud cloud-b" aria-hidden="true"></div>
          <div id="stage-hint" class="stage-hint" aria-live="polite"></div>
          <div id="stage-actors" class="stage-actors" aria-label="舞台角色"></div>
          <div class="stage-ground" aria-hidden="true"></div>
        </div>

        <div class="scene-switch">
          <span class="scene-title">场景</span>
          <div id="scene-chips" class="scene-chips" aria-label="场景切换"></div>
        </div>
      </section>

      <aside class="ai-panel card">
        <div class="panel-head">
          <h2>小老师</h2>
          <button id="read-ai-btn" class="round-icon" type="button" aria-label="再次朗读提示">
            <span class="button-icon control-icon" aria-hidden="true">🔊</span>
          </button>
        </div>
        <div class="ai-card">
          <div id="ai-avatar" class="ai-avatar" aria-hidden="true">👩‍🏫</div>
          <div class="ai-body">
            <p class="ai-name">积木老师</p>
            <p id="ai-message" class="ai-message" aria-live="polite"></p>
          </div>
        </div>
        <div class="ai-moods" aria-hidden="true">
          <span id="ai-mood-chip" class="mood-chip active">温柔提示</span>
          <span class="mood-chip">会鼓励</span>
          <span class="mood-chip">会纠错</span>
        </div>
        <div id="ai-suggestion" class="ai-suggestion"></div>
      </aside>
    </main>

    <section class="coding-panel card">
      <div class="coding-grid">
        <div class="block-pool-panel">
          <div class="panel-head">
            <h2>积木池</h2>
            <span class="panel-badge">拖一拖</span>
          </div>
          <div id="trigger-strip" class="trigger-strip" aria-label="触发方式"></div>
          <div id="block-pool" class="block-pool" aria-label="可用积木"></div>
        </div>

        <div class="program-panel">
          <div class="panel-head">
            <h2>程序区</h2>
            <div class="program-actions">
              <button id="reset-btn" class="pill-button ghost" type="button">
                <span class="button-icon control-icon" aria-hidden="true">🔄</span>
                <span class="button-label">重来</span>
              </button>
              <button id="run-btn" class="pill-button primary" type="button">
                <span class="button-icon control-icon" aria-hidden="true">▶️</span>
                <span class="button-label">开始</span>
              </button>
            </div>
          </div>

          <div id="actor-tabs" class="actor-tabs" role="tablist" aria-label="角色脚本"></div>
          <div id="script-slots" class="script-slots" aria-label="脚本槽"></div>
        </div>
      </div>
    </section>

    <section id="debug-panel" class="debug-panel card" hidden aria-label="调试日志面板">
      <div class="panel-head">
        <h2>调试日志</h2>
        <div class="debug-controls">
          <label class="debug-inline">
            <span>Mock 延迟</span>
            <select id="debug-delay-select" class="debug-select" aria-label="Mock 延迟"></select>
          </label>
          <button id="debug-fail-btn" class="pill-button ghost" type="button">下次 API 失败</button>
          <button id="debug-clear-logs-btn" class="pill-button ghost" type="button">清空日志</button>
          <button id="debug-clear-storage-btn" class="pill-button ghost warn" type="button">清空本地存档</button>
        </div>
      </div>
      <div id="debug-summary" class="debug-summary" aria-live="polite"></div>
      <div id="debug-log-list" class="debug-log-list" role="log" aria-live="polite"></div>
    </section>
  </div>

  <script src="config.js"></script>
  <script src="state.js"></script>
  <script src="render.js"></script>
  <script src="speech.js"></script>
  <script src="api.js"></script>
  <script src="runtime.js"></script>
  <script src="drag.js"></script>
  <script src="bootstrap.js"></script>
</body>
</html>
