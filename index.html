<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>积木小老师</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <header class="top-bar card">
      <div class="brand">
        <div class="brand-mark" aria-label="品牌图标">
          <img id="brand-photo" class="brand-photo" alt="左上角照片图标" hidden>
          <span id="brand-fallback" class="brand-fallback" aria-hidden="true">🤖✨🧱</span>
        </div>
        <div>
          <h1>积木小老师</h1>
          <p>AI 编程启蒙伙伴</p>
        </div>
      </div>
      <div class="top-actions">
        <button id="read-task-btn" class="icon-button primary" type="button" aria-label="朗读当前任务">
          <span aria-hidden="true">🔊</span>
          <span>朗读任务</span>
        </button>
        <button id="skip-speech-btn" class="icon-button ghost" type="button" aria-label="跳过当前朗读">
          <span aria-hidden="true">⏭</span>
          <span>跳过朗读</span>
        </button>
        <button id="sound-toggle-btn" class="icon-button ghost" type="button" aria-label="切换声音">
          <span id="sound-toggle-icon" aria-hidden="true">🔈</span>
          <span id="sound-toggle-text">有声音</span>
        </button>
      </div>
    </header>

    <main class="main-grid">
      <section class="task-panel card">
        <div class="panel-head">
          <h2>任务</h2>
          <span class="panel-badge">选一个玩</span>
        </div>
        <div id="task-list" class="task-list" aria-label="任务列表"></div>

        <div class="voice-panel">
          <div class="panel-head small">
            <h3>说一说</h3>
            <button id="voice-toggle-btn" class="round-icon" type="button" aria-label="打开语音示例">
              🎤
            </button>
          </div>
          <div id="voice-user-bubble" class="voice-user-bubble" aria-live="polite"></div>
          <div id="voice-samples" class="voice-samples" aria-label="示例语音指令"></div>
        </div>
      </section>

      <section class="stage-panel card">
        <div class="panel-head">
          <h2>舞台</h2>
          <span id="stage-badge" class="panel-badge">小猫</span>
        </div>
        <div id="stage-world" class="stage-world cat-theme">
          <div class="stage-deco deco-star star-a" aria-hidden="true">✦</div>
          <div class="stage-deco deco-star star-b" aria-hidden="true">✦</div>
          <div class="stage-deco deco-cloud cloud-a" aria-hidden="true"></div>
          <div class="stage-deco deco-cloud cloud-b" aria-hidden="true"></div>
          <div id="stage-bubble" class="stage-bubble" aria-live="polite"></div>
          <button id="stage-actor" class="stage-actor" type="button" aria-label="舞台角色">
            <span class="actor-shadow" aria-hidden="true"></span>
            <span id="actor-core" class="actor-core" aria-hidden="true">🐱</span>
          </button>
          <div class="stage-ground" aria-hidden="true"></div>
          <div id="stage-guide" class="stage-guide" aria-live="polite"></div>
        </div>
      </section>

      <aside class="ai-panel card">
        <div class="panel-head">
          <h2>小老师</h2>
          <button id="read-ai-btn" class="round-icon" type="button" aria-label="再次朗读提示">
            🔊
          </button>
        </div>
        <div class="ai-card">
          <div class="ai-avatar" aria-hidden="true">
            <span>🤖</span>
          </div>
          <div class="ai-body">
            <p class="ai-name">积木老师</p>
            <p id="ai-message" class="ai-message" aria-live="polite"></p>
          </div>
        </div>
        <div class="ai-moods" aria-hidden="true">
          <span class="mood-chip">温柔提示</span>
          <span class="mood-chip">会鼓励</span>
          <span class="mood-chip">会纠错</span>
        </div>
      </aside>
    </main>

    <section class="coding-panel card">
      <div class="coding-grid">
        <div class="block-pool-panel">
          <div class="panel-head">
            <h2>积木池</h2>
            <span class="panel-badge">拖一拖</span>
          </div>
          <div id="block-pool" class="block-pool" aria-label="可用积木"></div>
        </div>

        <div class="program-panel">
          <div class="panel-head">
            <h2>程序区</h2>
            <div class="program-actions">
              <button id="reset-btn" class="pill-button ghost" type="button">重置</button>
              <button id="run-btn" class="pill-button primary" type="button">运行</button>
            </div>
          </div>
          <div id="program-track" class="program-track" aria-label="程序轨道">
            <div id="program-list" class="program-list"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
